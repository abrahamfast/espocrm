<!doctype html>
<html>
    <head>
        <title>{{applicationName}}</title>
        <link id="skin-default" rel="stylesheet" href="/client/assets/css/dashlite-ver=1.9.2.css">
        <link  rel="stylesheet" href="/client/assets/css/theme-ver=1.9.2.css">
        <script src="/client/assets/js/bundle-ver=1.9.2.js"></script>
        {{scriptsHtml}}
        <link href="{{basePath}}{{stylesheet}}?r={{cacheTimestamp}}" rel="stylesheet" id='main-stylesheet'>

        {{additionalStyleSheetsHtml}}{{linksHtml}}


        <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
        <meta content="utf-8" http-equiv="encoding">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="description" content="">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="shortcut icon" sizes="196x196" href="{{basePath}}{{favicon196Path}}">
        <link rel="icon" href="{{basePath}}{{faviconPath}}" type="image/x-icon">
        <link rel="shortcut icon" href="{{basePath}}{{faviconPath}}" type="image/x-icon">
        <script type="text/javascript">
            $(function () {
                Espo.loader.cacheTimestamp = {{loaderCacheTimestamp}};
                Espo.require('{{appClientClassName}}', function (App) {
                    var app = new App({
                        id: '{{applicationId}}',
                        useCache: {{useCache}},
                        cacheTimestamp: {{cacheTimestamp}},
                        basePath: '{{basePath}}',
                        url: '{{apiUrl}}',
                        ajaxTimeout: {{ajaxTimeout}},
                    }, function (app) {
                        {{runScript}}
                    });
                });
            });
        </script>
    </head>
    <body class="nk-body npc-default has-apps-sidebar has-sidebar">
        <div class="container content"></div>
        <script src="/client/assets/js/scripts-ver=1.9.2.js"></script>
    </body>
</html>
